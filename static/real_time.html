<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>GymAI Rep Counter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0d0d; --surface:#1a1a1a; --surface2:#242424;
      --accent:#00e5ff; --accent2:#00ff88;
      --warn:#ffb300; --danger:#ff4444;
      --text:#f0f0f0; --dim:#888; --radius:14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top:    env(safe-area-inset-top, 0px);
      --ctrl-h: 68px;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      overscroll-behavior: none;
    }

    /* ═══ 헤더 ═══ */
    header {
      padding: 12px 16px;
      padding-top: calc(12px + var(--safe-top));
      background: var(--surface);
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #2a2a2a;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1rem; font-weight: 700; color: var(--accent); }
    .phase-badge {
      margin-left: auto; padding: 4px 12px; border-radius: 20px;
      font-size: .75rem; font-weight: 600;
      background: var(--surface2); color: var(--accent); border: 1px solid var(--accent);
      white-space: nowrap;
    }

    /* ═══ 스크롤 영역 ═══ */
    main {
      flex: 1; overflow-y: auto;
      padding: 0 0 calc(var(--ctrl-h) + var(--safe-bottom) + 8px);
      display: flex; flex-direction: column; gap: 0;
    }

    /* ═══ 카메라 ═══ */
    .camera-wrap {
      position: relative; width: 100%;
      background: #000; aspect-ratio: 4/3;
    }
    @media (min-width: 640px) {
      main { padding-left: 16px; padding-right: 16px; gap: 14px; }
      main > *:first-child { margin-top: 16px; }
      .camera-wrap { border-radius: var(--radius); overflow: hidden; }
    }

    #localCanvas, #serverCanvas {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    #serverCanvas { display: none; }
    #bboxCanvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none;
    }

    /* 장비 확인 모달 */
    #confirmOverlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.72);
    }
    #confirmOverlay.hidden { display: none; }
    .confirm-box {
      background: var(--surface); border: 2px solid var(--accent);
      border-radius: 18px; padding: 28px 24px; text-align: center;
      width: min(320px, 88vw); animation: popIn .3s ease;
    }
    .confirm-icon { font-size: 2.6rem; }
    .confirm-title {
      font-size: 1.05rem; font-weight: 700; margin: 10px 0 4px;
      color: var(--text);
    }
    .confirm-conf { font-size: .82rem; color: var(--dim); margin-bottom: 20px; }
    .confirm-btns { display: flex; gap: 10px; }
    .btn-confirm-yes {
      flex: 1; height: 46px; border: none; border-radius: 10px;
      background: var(--accent2); color: #000;
      font-size: .9rem; font-weight: 700; cursor: pointer;
    }
    .btn-confirm-no {
      flex: 1; height: 46px; border: 1px solid #444; border-radius: 10px;
      background: var(--surface2); color: var(--text);
      font-size: .9rem; font-weight: 700; cursor: pointer;
    }

    /* ═══ 감지 중 안내 (하단 바) ═══ */
    .detect-guide {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.85));
      padding: 28px 16px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      pointer-events: none;
    }
    .detect-guide.hidden { display: none; }
    .detect-guide-text { font-size: .88rem; font-weight: 600; color: var(--text); }
    .detect-guide-sub  { font-size: .76rem; color: var(--dim); }

    /* ═══ LLM 분석 중 오버레이 ═══ */
    .overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: rgba(0,0,0,.72); pointer-events: none;
    }
    .overlay.hidden { display: none; }
    .spinner {
      width: 48px; height: 48px; border: 4px solid #333;
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-title { font-size: 1rem; font-weight: 600; }
    .overlay-sub   { font-size: .82rem; color: var(--dim); text-align: center; padding: 0 24px; }

    /* ═══ 셋업 오버레이 ═══ */
    #setupOverlay {
      position: absolute; inset: 0; pointer-events: none;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    #setupOverlay.hidden { display: none; }
    .setup-bottom {
      background: linear-gradient(transparent, rgba(0,0,0,.93));
      padding: 36px 16px 14px;
      display: flex; flex-direction: column; gap: 9px;
    }
    .setup-title-row {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 4px;
    }
    .setup-ex-name { font-size: .95rem; font-weight: 700; color: var(--accent); }
    .setup-hint    { font-size: .72rem; color: var(--dim); }
    .setup-bars    { display: flex; flex-direction: column; gap: 5px; }
    .bar-row { display: flex; align-items: center; gap: 8px; }
    .bar-lbl { font-size: .72rem; color: #aaa; width: 52px; flex-shrink: 0; }
    .bar-pct { font-size: .72rem; color: #aaa; width: 34px; text-align: right; flex-shrink: 0; }
    .prog-wrap {
      flex: 1; height: 7px; background: rgba(255,255,255,.15);
      border-radius: 4px; overflow: hidden;
    }
    .prog-bar { height: 100%; border-radius: 4px; transition: width .25s; background: var(--accent); }
    .prog-bar.stable { background: var(--accent2); }
    .setup-msg { font-size: .88rem; font-weight: 500; min-height: 1.3em; color: var(--warn); }
    .setup-msg.ok   { color: var(--accent2); }
    .setup-msg.idle { color: var(--dim); }

    /* ═══ 준비 완료 뱃지 ═══ */
    #readyBadge {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; pointer-events: none;
    }
    #readyBadge.hidden { display: none; }
    .ready-badge-inner {
      background: rgba(0,255,136,.15); border: 2px solid var(--accent2);
      border-radius: 20px; padding: 20px 36px; text-align: center;
      animation: popIn .35s ease;
    }
    .r-icon { font-size: 2.4rem; }
    .r-text { font-size: 1.15rem; font-weight: 700; color: var(--accent2); margin-top: 6px; }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ═══ 카운터 오버레이 ═══ */
    #countOverlay {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,.8); border: 2px solid var(--accent);
      border-radius: 14px; padding: 10px 18px; text-align: center; pointer-events: none;
    }
    #countOverlay .num { font-size: 3.4rem; font-weight: 900; color: var(--accent2); line-height: 1; }
    #countOverlay .lbl { font-size: .7rem; color: var(--dim); margin-top: 2px; }
    #countOverlay.hidden { display: none; }
    #pauseBanner {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(255,68,68,.88); padding: 8px 20px;
      border-radius: 20px; font-size: .85rem; font-weight: 600; pointer-events: none;
      white-space: nowrap;
    }
    #pauseBanner.hidden { display: none; }

    /* ═══ 패널 공통 ═══ */
    .panel {
      background: var(--surface); padding: 14px 16px;
      border-bottom: 1px solid #1e1e1e;
    }
    @media (min-width: 640px) {
      .panel { border-radius: var(--radius); border-bottom: none; }
    }

    /* ═══ 관절 상태 패널 ═══ */
    #jointPanel.hidden { display: none; }
    .joint-panel-label { font-size: .72rem; color: var(--dim); font-weight: 600;
                         letter-spacing: .04em; margin-bottom: 10px; }
    .joint-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .joint-tag {
      padding: 6px 14px; border-radius: 20px;
      font-size: .82rem; font-weight: 600;
      display: flex; align-items: center; gap: 5px;
      transition: background .25s, color .25s, border-color .25s;
    }
    .joint-tag.ok  { background: rgba(0,255,136,.12); color: var(--accent2); border: 1px solid rgba(0,255,136,.3); }
    .joint-tag.bad { background: rgba(255,68,68,.12);  color: var(--danger);  border: 1px solid rgba(255,68,68,.3); }
    .joint-tag.wait{ background: var(--surface2);       color: var(--dim);     border: 1px solid #333; }

    /* ═══ 점수 바 ═══ */
    #scoreRow { display: flex; align-items: center; gap: 10px; }
    #scoreRow.hidden { display: none; }
    #scoreLabel { font-size: .78rem; color: var(--dim); width: 55px; }
    #scorePct   { font-size: .78rem; color: var(--dim); width: 36px; text-align: right; }
    #scoreRow .prog-wrap { background: #2a2a2a; }

    /* ═══ 운동 선택 ═══ */
    #selectPanel.hidden { display: none; }
    #selectPanel h2 { font-size: .85rem; color: var(--dim); margin-bottom: 3px; }
    .equipment-name { font-size: 1.25rem; font-weight: 700; color: var(--accent); margin-bottom: 14px; }
    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    @media (min-width: 480px) {
      .exercise-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
    .exercise-card {
      background: var(--surface2); border: 2px solid transparent;
      border-radius: 12px; padding: 18px 10px; text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .15s, transform .1s;
    }
    .exercise-card:active { transform: scale(.96); border-color: var(--accent); }
    @media (hover: hover) {
      .exercise-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    }
    .card-emoji { font-size: 2rem; }
    .card-name  { margin-top: 8px; font-size: .84rem; font-weight: 600; }

    /* ═══ 하단 고정 컨트롤 바 ═══ */
    .controls {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      background: var(--surface);
      border-top: 1px solid #2a2a2a;
      padding: 10px 14px;
      padding-bottom: calc(10px + var(--safe-bottom));
      display: flex; gap: 8px;
    }
    @media (min-width: 640px) {
      .controls { max-width: 900px; left: 50%; transform: translateX(-50%); border-radius: var(--radius) var(--radius) 0 0; }
    }
    button {
      flex: 1; padding: 0 10px;
      height: 46px;
      border: none; border-radius: 10px;
      font-size: .82rem; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity .15s, transform .1s;
    }
    button:active:not(:disabled) { transform: scale(.95); opacity: .8; }
    @media (hover: hover) {
      button:hover:not(:disabled) { opacity: .82; }
    }
    button:disabled { opacity: .32; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid #3a3a3a; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-finish  { background: var(--accent2); color: #000; }

    /* ═══ 피드백 패널 ═══ */
    #feedbackPanel {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(0,0,0,.6);
      display: flex; align-items: flex-end;
      animation: fadeIn .25s ease;
    }
    #feedbackPanel.hidden { display: none; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .feedback-sheet {
      background: var(--surface); width: 100%;
      border-radius: 22px 22px 0 0;
      padding: 0 0 calc(20px + var(--safe-bottom));
      max-height: 88dvh; display: flex; flex-direction: column;
      animation: slideUp .35s cubic-bezier(.32,1,.6,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @media (min-width: 640px) {
      #feedbackPanel { align-items: center; }
      .feedback-sheet { max-width: 640px; border-radius: 22px; margin-bottom: 40px; }
    }

    .feedback-handle {
      width: 40px; height: 4px; background: #3a3a3a;
      border-radius: 2px; margin: 14px auto 0;
    }
    .feedback-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #2a2a2a;
    }
    .feedback-title {
      font-size: 1rem; font-weight: 700; color: var(--accent);
    }
    .feedback-meta {
      font-size: .78rem; color: var(--dim); margin-top: 4px;
    }

    .feedback-body {
      flex: 1; overflow-y: auto; padding: 20px;
    }

    /* 로딩 상태 */
    .feedback-loading-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px; padding: 40px 0;
    }
    .feedback-loading-wrap .spinner {
      width: 42px; height: 42px; border: 3px solid #333;
      border-top-color: var(--accent2); border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    .feedback-loading-text {
      font-size: .9rem; color: var(--dim); text-align: center;
    }

    /* 피드백 텍스트 */
    .feedback-text {
      font-size: .9rem; line-height: 1.75;
      color: var(--text); white-space: pre-wrap;
    }
    .feedback-error {
      font-size: .88rem; color: var(--danger);
      text-align: center; padding: 30px 0;
    }

    .feedback-actions {
      display: flex; gap: 10px;
      padding: 14px 20px 0;
    }

    /* ═══ 데스크톱 레이아웃 ═══ */
    @media (min-width: 640px) {
      body { align-items: center; }
      main { width: 100%; max-width: 900px; }
    }
  </style>
</head>
<body>

<header>
  <span>🏋️</span>
  <h1>GymAI Rep Counter</h1>
  <div class="phase-badge" id="phaseBadge">대기</div>
</header>

<main>
  <!-- ── 카메라 ── -->
  <div class="camera-wrap">
    <canvas id="localCanvas"></canvas>
    <canvas id="serverCanvas"></canvas>
    <canvas id="bboxCanvas"></canvas>

    <!-- 장비 확인 모달 -->
    <div id="confirmOverlay" class="hidden">
      <div class="confirm-box">
        <div class="confirm-icon" id="confirmIcon">🏋️</div>
        <div class="confirm-title" id="confirmTitle">감지된 기구</div>
        <div class="confirm-conf" id="confirmConf">신뢰도: —</div>
        <div class="confirm-reason" id="confirmReason" style="font-size:.8rem;color:#aaa;margin-bottom:14px;"></div>
        <div class="confirm-btns">
          <button class="btn-confirm-yes" onclick="confirmEquipment()">✓ 맞습니다</button>
          <button class="btn-confirm-no"  onclick="denyEquipment()">✗ 다시 촬영</button>
        </div>
      </div>
    </div>

    <!-- 감지 중 하단 안내 -->
    <div class="detect-guide" id="detectGuide">
      <div class="detect-guide-text">📷 기구를 카메라에 비춰주세요</div>
      <div class="detect-guide-sub">바운딩 박스가 나타나면 촬영 버튼을 누르세요</div>
    </div>

    <!-- LLM 분석 중 오버레이 -->
    <div class="overlay hidden" id="analyzingOverlay">
      <div class="spinner"></div>
      <div class="overlay-title">AI가 기구를 분석하고 있습니다</div>
      <div class="overlay-sub">잠시만 기다려주세요...</div>
    </div>

    <!-- 셋업 단계 관절 감지 피드백 -->
    <div id="setupOverlay" class="hidden">
      <div class="setup-bottom">
        <div class="setup-title-row">
          <span class="setup-ex-name" id="setupExName">—</span>
          <span class="setup-hint">감지되면 자동 시작</span>
        </div>
        <div class="setup-bars">
          <div class="bar-row">
            <span class="bar-lbl">관절 감지</span>
            <div class="prog-wrap"><div class="prog-bar" id="setupVisBar" style="width:0%"></div></div>
            <span class="bar-pct" id="setupVisPct">—</span>
          </div>
          <div class="bar-row">
            <span class="bar-lbl">안정화</span>
            <div class="prog-wrap"><div class="prog-bar stable" id="setupStableBar" style="width:0%"></div></div>
            <span class="bar-pct" id="setupStablePct">—</span>
          </div>
        </div>
        <div class="setup-msg idle" id="setupMsg">카메라를 조정하면 자동으로 시작됩니다</div>
      </div>
    </div>

    <!-- 준비 완료 뱃지 -->
    <div id="readyBadge" class="hidden">
      <div class="ready-badge-inner">
        <div class="r-icon">✅</div>
        <div class="r-text">시작합니다!</div>
      </div>
    </div>

    <!-- 카운팅 오버레이 -->
    <div id="countOverlay" class="hidden">
      <div class="num" id="countNum">0</div>
      <div class="lbl"  id="countLbl">횟수</div>
    </div>
    <div id="pauseBanner" class="hidden">⏸ 자세 확인</div>
  </div>

  <!-- ── 관절 상태 칩 ── -->
  <div id="jointPanel" class="panel hidden">
    <div class="joint-panel-label">필수 관절 감지 현황</div>
    <div class="joint-tags" id="jointTags"></div>
  </div>

  <!-- ── 점수 바 ── -->
  <div id="scoreRow" class="panel hidden">
    <span id="scoreLabel">포즈 점수</span>
    <div class="prog-wrap"><div class="prog-bar" id="scoreBarFill" style="width:0%"></div></div>
    <span id="scorePct">0%</span>
  </div>

  <!-- ── 운동 선택 ── -->
  <div id="selectPanel" class="panel hidden">
    <h2>감지된 기구</h2>
    <div class="equipment-name" id="equipmentName">—</div>
    <div class="exercise-grid" id="exerciseGrid"></div>
  </div>
</main>

<!-- ── 하단 고정 컨트롤 바 ── -->
<div class="controls">
  <button class="btn-primary" id="startBtn"   onclick="startCamera()">▶ 시작</button>
  <button class="btn-primary" id="captureBtn" onclick="captureFrame()" disabled style="background:var(--accent2);color:#000;">📸 촬영</button>
  <button class="btn-ghost"   id="resetBtn"   onclick="resetCount()"     disabled>↺ 초기화</button>
  <button class="btn-finish"  id="finishBtn"  onclick="finishWorkout()"  disabled>✓ 완료</button>
  <button class="btn-ghost"   id="restartBtn" onclick="restartSession()" disabled>⟳ 처음부터</button>
  <button class="btn-danger"  id="stopBtn"    onclick="stopCamera()"     disabled>■ 중지</button>
</div>

<!-- ── 피드백 패널 ── -->
<div id="feedbackPanel" class="hidden">
  <div class="feedback-sheet">
    <div class="feedback-handle"></div>
    <div class="feedback-header">
      <div class="feedback-title">🏋️ 운동 피드백</div>
      <div class="feedback-meta" id="feedbackMeta"></div>
    </div>
    <div class="feedback-body" id="feedbackBody">
      <div class="feedback-loading-wrap">
        <div class="spinner"></div>
        <div class="feedback-loading-text">AI가 운동 데이터를 분석하고 있습니다<br>잠시만 기다려주세요...</div>
      </div>
    </div>
    <div class="feedback-actions">
      <button class="btn-ghost"    style="flex:1" onclick="closeFeedback()">✕ 닫기</button>
      <button class="btn-primary"  style="flex:2" onclick="newWorkout()">▶ 새 운동 시작</button>
    </div>
  </div>
</div>

<video id="video" autoplay playsinline muted style="display:none"></video>

<script>
// ═══════════════════════════════════════════════════════════════
// 상수
// ═══════════════════════════════════════════════════════════════
const EXERCISE_NAMES = {
  squat:'스쿼트', push_up:'푸시업', bench_pressing:'벤치프레스',
  pull_up:'풀업', front_raise:'프론트 레이즈', situp:'싯업', jump_jack:'점핑잭',
  deadlift:'데드리프트', leg_press:'레그 프레스', barbell_row:'바벨 로우',
  lat_pull_down:'랫 풀다운', ohp:'오버헤드 프레스', lunge:'런지',
  barbell_arm_curl:'바벨 컬', seated_row:'시티드 로우',
  lateral_raises:'레터럴 레이즈', leg_raises:'레그 레이즈',
};

let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, type = 'sine', vol = 0.25) {
  try {
    const ctx = getAudio(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playReady()   { beep(523,.12); setTimeout(()=>beep(659,.12),130); setTimeout(()=>beep(784,.3),260); }
function playRep()     { beep(880,.08,'sine',.18); }
function playWarning() { beep(220,.3,'sawtooth',.12); }
function playTick()    { beep(1400,.04,'sine',.07); }

// TTS
// ═══════════════════════════════════════════════════════════════
let lastSpokenText = '', lastSpokenTime = 0;
let ttsUnlocked = false;
const TTS_COOLDOWN = 4000;

// 모바일: 첫 사용자 탭 시 빈 utterance로 TTS 초기화
function unlockTTS() {
  if (ttsUnlocked || !window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance('');
  window.speechSynthesis.speak(utt);
  ttsUnlocked = true;
}
document.addEventListener('touchstart', unlockTTS, { once: true });
document.addEventListener('click',      unlockTTS, { once: true });

// iOS: speechSynthesis 15초 후 paused 버그 방지
setInterval(() => {
  if (!window.speechSynthesis) return;
  if (window.speechSynthesis.paused) window.speechSynthesis.resume();
}, 5000);

function speak(text, force = false) {
  if (!window.speechSynthesis || !text) return;
  const now = Date.now();
  if (!force && text === lastSpokenText && now - lastSpokenTime < TTS_COOLDOWN) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ko-KR'; utt.rate = 1.0; utt.pitch = 1.0;
  window.speechSynthesis.speak(utt);
  lastSpokenText = text; lastSpokenTime = now;
}

localCanvas.height = serverCanvas.height = bboxCanvas.height = 480;

// ═══════════════════════════════════════════════════════════════
// 카메라
// ═══════════════════════════════════════════════════════════════
async function startCamera() {
  try {
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 }, height: { ideal: 720 },
      }
    };
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch {
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
    }
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      const w = video.videoWidth, h = video.videoHeight;
      localCanvas.width = serverCanvas.width = bboxCanvas.width = w;
      localCanvas.height = serverCanvas.height = bboxCanvas.height = h;
      video.play(); isStreaming = true;
      drawLocalLoop(); connectWS();
      setBtn('startBtn', true); setBtn('stopBtn', false);
    };
  } catch(e) { alert('카메라 접근 권한이 필요합니다.\n설정에서 카메라 허용 후 다시 시도해주세요.'); }
}

function stopCamera() {
  isStreaming = false; clearInterval(sendInterval);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (ws) { ws.close(); ws = null; }
  setPhase('idle');
  setBtn('startBtn', false); setBtn('stopBtn', true);
  setBtn('resetBtn', true);  setBtn('restartBtn', true);
}

function drawLocalLoop() {
  if (!isStreaming) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA)
    localCtx.drawImage(video, 0, 0, localCanvas.width, localCanvas.height);
  requestAnimationFrame(drawLocalLoop);
}

// ═══════════════════════════════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════════════════════════════
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const port  = location.port || (location.protocol === 'https:' ? '443' : '80');
  ws = new WebSocket(`${proto}//${location.hostname}:${port}/ws/exercise`);
  ws.onopen    = () => { setPhase('detecting'); startDetectSend(); setBtn('restartBtn', false); setBtn('captureBtn', false); };
  ws.onmessage = e  => handleMessage(JSON.parse(e.data));
  ws.onclose   = () => { clearInterval(sendInterval); };
  ws.onerror   = e  => console.error('[WS]', e);
}

function sendFrame() {
  if (!ws || ws.readyState !== WebSocket.OPEN || !isStreaming) return;
  const tmp = document.createElement('canvas');
  tmp.width = 640; tmp.height = 480;
  tmp.getContext('2d').drawImage(localCanvas, 0, 0, 640, 480);
  tmp.toBlob(blob => {
    const r = new FileReader();
    r.onload = () => ws.send(JSON.stringify({ type:'frame', data: r.result.split(',')[1] }));
    r.readAsDataURL(blob);
  }, 'image/jpeg', 0.65);
}

function startDetectSend() {
  clearInterval(sendInterval);
  sendInterval = setInterval(() => { if (currentPhase === 'detecting') sendFrame(); }, 300);
}

function captureFrame() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'capture' }));
  setBtn('captureBtn', true);
}

function startCountSend() {
  clearInterval(sendInterval);
  sendInterval = setInterval(() => {
    if (currentPhase === 'setup' || currentPhase === 'counting') sendFrame();
  }, 60);
}

// ═══════════════════════════════════════════════════════════════
// 메시지 핸들러
// ═══════════════════════════════════════════════════════════════
function handleMessage(data) {
  switch (data.type) {
    case 'detecting':
      drawBboxes(data.bboxes || []);
      break;

    case 'analyzing':
      show('analyzingOverlay', true);
      show('detectGuide', false);
      break;

    case 'equipment_detected':
      show('analyzingOverlay', false);
      pendingEquipment = data.equipment;
      drawBboxes(data.bboxes || []);
      showConfirmModal(data.equipment, data.confidence, data.display_name, data.reason);
      setPhase('confirming');
      break;

    case 'confirming':
      drawBboxes(data.bboxes || []);
      break;

    case 'equipment_confirmed':
      setPhase('selecting');
      showEquipmentSelect(data.equipment, data.exercises);
      break;

    case 'camera_guide':
      if (data.frame) showServerFrame(data.frame);
      updateSetupFeedback(data);
      break;

    case 'counting_ready':   onCountingReady(); break;

    case 'rep_update':
      if (data.frame) showServerFrame(data.frame);
      updateCount(data);
      break;

    case 'reset_confirmed':
      prevCount = 0;
      document.getElementById('countNum').textContent = '0';
      break;

    case 'restarted':
      pendingEquipment = null;
      selectedExercise = null; prevVisPct = 0; prevMsgText = '';
      clearBboxes();
      show('analyzingOverlay', false);
      setPhase('detecting'); startDetectSend();
      setBtn('captureBtn', false);
      break;

    case 'feedback_loading':
      setPhase('finishing');
      showFeedbackPanel(null);
      break;

    case 'feedback_ready':
      showFeedbackPanel(data);
      break;

    case 'feedback_error':
      showFeedbackPanel({ error: data.message });
      break;
  }
}

// ═══════════════════════════════════════════════════════════════
// 페이즈 전환
// ═══════════════════════════════════════════════════════════════
function setPhase(phase) {
  currentPhase = phase;
  const labels = {
    idle:'대기', detecting:'감지 중', confirming:'기구 확인',
    selecting:'운동 선택', setup:'관절 감지 중', counting:'카운팅',
    finishing:'피드백 생성 중',
  };
  document.getElementById('phaseBadge').textContent = labels[phase] || phase;

  show('detectGuide',    phase === 'detecting');
  show('confirmOverlay', phase === 'confirming');
  show('selectPanel',    phase === 'selecting');
  show('setupOverlay',   phase === 'setup');
  show('jointPanel',     phase === 'setup');
  show('readyBadge',     false);
  show('countOverlay',   phase === 'counting');
  show('scoreRow',       phase === 'counting');
  show('pauseBanner',    false);

  const useLocal = ['detecting', 'confirming', 'selecting'].includes(phase);
  localCanvas.style.display  = useLocal ? 'block' : 'none';
  serverCanvas.style.display = useLocal ? 'none'  : 'block';
  bboxCanvas.style.display   = useLocal ? 'block' : 'none';

  if (!useLocal) clearBboxes();

  setBtn('captureBtn', phase !== 'detecting');
  setBtn('resetBtn',   phase !== 'counting');
  setBtn('finishBtn',  phase !== 'counting');
  setBtn('restartBtn', phase === 'idle' || phase === 'finishing');
}

// ═══════════════════════════════════════════════════════════════
// UI 업데이트
// ═══════════════════════════════════════════════════════════════
// ── bbox 그리기 ──────────────────────────────────────────────────────────
function drawBboxes(bboxes) {
  const cw = bboxCanvas.width, ch = bboxCanvas.height;
  bboxCtx.clearRect(0, 0, cw, ch);
  if (!bboxes || !bboxes.length) return;

  bboxes.forEach(b => {
    const [x1n, y1n, x2n, y2n] = b.bbox;
    const x1 = x1n * cw, y1 = y1n * ch;
    const bw = (x2n - x1n) * cw, bh = (y2n - y1n) * ch;
    const arm = Math.min(bw, bh) * 0.18;

    // 안쪽 반투명 오버레이
    bboxCtx.fillStyle = 'rgba(0, 229, 255, 0.08)';
    bboxCtx.fillRect(x1, y1, bw, bh);

    // 글로우 + 코너 브래킷
    bboxCtx.shadowColor  = '#00e5ff';
    bboxCtx.shadowBlur   = 12;
    bboxCtx.strokeStyle  = '#00e5ff';
    bboxCtx.lineWidth    = 2.5;
    bboxCtx.lineCap      = 'round';

    const corners = [
      [x1,      y1,      arm,  0,   0,    arm],  // 좌상
      [x1+bw,   y1,     -arm,  0,   0,    arm],  // 우상
      [x1,      y1+bh,   arm,  0,   0,   -arm],  // 좌하
      [x1+bw,   y1+bh,  -arm,  0,   0,   -arm],  // 우하
    ];
    corners.forEach(([cx, cy, hx, hy, vx, vy]) => {
      bboxCtx.beginPath();
      bboxCtx.moveTo(cx + hx, cy + hy);
      bboxCtx.lineTo(cx, cy);
      bboxCtx.lineTo(cx + vx, cy + vy);
      bboxCtx.stroke();
    });

    bboxCtx.shadowBlur = 0;
  });
}
function clearBboxes() {
  bboxCtx.clearRect(0, 0, bboxCanvas.width, bboxCanvas.height);
}

// ── 장비 확인 모달 ────────────────────────────────────────────────────────
function showConfirmModal(equipment, confidence, displayName, reason) {
  const emoji = EQUIPMENT_EMOJI[equipment] || '❓';
  const name  = displayName || EQUIPMENT_NAMES[equipment] || equipment;
  document.getElementById('confirmIcon').textContent   = emoji;
  document.getElementById('confirmTitle').textContent  = `${name} 감지됨`;
  document.getElementById('confirmConf').textContent   =
    `신뢰도: ${Math.round((confidence || 0) * 100)}%`;
  document.getElementById('confirmReason').textContent = reason || '';
}
function confirmEquipment() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'confirm_equipment' }));
}
function denyEquipment() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'deny_equipment' }));
}

function showEquipmentSelect(equipment, exercises) {
  document.getElementById('equipmentName').textContent =
    (equipment === 'unknown' ? '❓' : '✅') + '  ' + (EQUIPMENT_NAMES[equipment] || equipment);
  const grid = document.getElementById('exerciseGrid');
  grid.innerHTML = '';
  exercises.forEach(ex => {
    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.innerHTML = `<div class="card-emoji">${EXERCISE_EMOJI[ex]||'🏃'}</div>
                      <div class="card-name">${EXERCISE_NAMES[ex]||ex}</div>`;
    card.onclick = () => onExerciseClick(ex);
    grid.appendChild(card);
  });
}

function onExerciseClick(exercise) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  selectedExercise = exercise;
  prevVisPct = 0; prevMsgText = '';

  ws.send(JSON.stringify({ type: 'select_exercise', exercise }));
  document.getElementById('countLbl').textContent = EXERCISE_NAMES[exercise] || exercise;
  document.getElementById('setupExName').textContent =
    (EXERCISE_EMOJI[exercise]||'') + ' ' + (EXERCISE_NAMES[exercise]||exercise);

  setBar('setupVisBar', 0); setBar('setupStableBar', 0);
  document.getElementById('setupVisPct').textContent    = '—';
  document.getElementById('setupStablePct').textContent = '—';
  setSetupMsg('카메라를 조정하면 자동으로 시작됩니다', 'idle');
  renderJointChips(exercise, []);

  setPhase('setup');
  startCountSend();
}

function updateSetupFeedback(data) {
  const visPct    = Math.round((data.visible_ratio || 0) * 100);
  const stablePct = Math.round((data.stable_ratio  || 0) * 100);
  const missing   = data.missing_joints || [];

  setBar('setupVisBar',    visPct);
  setBar('setupStableBar', stablePct);
  document.getElementById('setupVisPct').textContent    = visPct + '%';
  document.getElementById('setupStablePct').textContent = stablePct + '%';

  if (selectedExercise) renderJointChips(selectedExercise, missing);

  if (visPct > prevVisPct && visPct % 25 === 0) playTick();
  prevVisPct = visPct;

  const msg = buildSetupMessage(data, missing);
  setSetupMsg(msg, visPct >= 80 ? 'ok' : '');
  if (missing.length > 0 && msg && msg !== prevMsgText) {
    const names = missing.map(j => JOINT_KO[j] || j).join(', ');
    speak(`${names} 이(가) 안 보입니다`);
    prevMsgText = msg;
  }
}

function buildSetupMessage(data, missing) {
  const visPct = Math.round((data.visible_ratio || 0) * 100);
  const stPct  = Math.round((data.stable_ratio  || 0) * 100);
  if (!data.pose_detected) return '카메라 앞에 서주세요.';
  if (missing.length > 0) {
    const names = missing.map(j => JOINT_KO[j] || j).join(', ');
    if (visPct < 40) return data.instruction || `${names}이(가) 보이지 않습니다. 카메라를 조정해주세요.`;
    return `${names}이(가) 가려져 있습니다. 카메라를 뒤로 이동하거나 각도를 조정해주세요.`;
  }
  if (stPct < 100) return `자세를 유지해주세요... (${stPct}%)`;
  return '';
}

function renderJointChips(exercise, missingJoints) {
  const joints = EXERCISE_JOINTS[exercise] || [];
  const container = document.getElementById('jointTags');
  if (container.childElementCount !== joints.length) {
    container.innerHTML = '';
    joints.forEach(() => container.appendChild(document.createElement('div')));
  }
  joints.forEach((joint, i) => {
    const tag = container.children[i];
    const isMissing = missingJoints.includes(joint);
    const isWaiting = missingJoints.length === 0 && prevVisPct === 0;
    const cls = isWaiting ? 'wait' : (isMissing ? 'bad' : 'ok');
    tag.className = `joint-tag ${cls}`;
    tag.textContent = `${isWaiting ? '○' : (isMissing ? '✗' : '✓')} ${JOINT_KO[joint]||joint}`;
  });
}

function onCountingReady() {
  if (selectedExercise) renderJointChips(selectedExercise, []);
  setBar('setupVisBar', 100); setBar('setupStableBar', 100);
  document.getElementById('setupVisPct').textContent    = '100%';
  document.getElementById('setupStablePct').textContent = '100%';
  setSetupMsg('감지 완료!', 'ok');
  show('readyBadge', true);
  playReady();
  speak('자세 확인 완료 운동 시작', true);
  setTimeout(() => { show('readyBadge', false); setPhase('counting'); }, 900);
}

function updateCount(data) {
  document.getElementById('countNum').textContent = data.count;
  const pct = Math.round(data.score * 100);
  setBar('scoreBarFill', pct);
  document.getElementById('scorePct').textContent = pct + '%';
  if (data.count > prevCount) { playRep(); speak(String(data.count), true); prevCount = data.count; }
  if (data.paused && !prevPaused) { playWarning(); }
  prevPaused = !!data.paused;
  show('pauseBanner', !!data.paused);
}

function showServerFrame(b64) {
  const img = new Image();
  img.onload = () => serverCtx.drawImage(img, 0, 0, serverCanvas.width, serverCanvas.height);
  img.src = 'data:image/jpeg;base64,' + b64;
}

function resetCount() {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type:'reset' }));
  prevCount = 0;
}
function restartSession() {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type:'restart' }));
  prevPaused = false; prevCount = 0;
}

// ═══════════════════════════════════════════════════════════════
// 운동 완료 & 피드백
// ═══════════════════════════════════════════════════════════════
function finishWorkout() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'finish_workout' }));
  setBtn('finishBtn', true);
  setBtn('resetBtn', true);
}

function showFeedbackPanel(data) {
  const panel = document.getElementById('feedbackPanel');
  const body  = document.getElementById('feedbackBody');
  const meta  = document.getElementById('feedbackMeta');

  panel.classList.remove('hidden');

  if (!data) {
    // 로딩 상태
    body.innerHTML = `
      <div class="feedback-loading-wrap">
        <div class="spinner"></div>
        <div class="feedback-loading-text">AI가 운동 데이터를 분석하고 있습니다<br>잠시만 기다려주세요...</div>
      </div>`;
    meta.textContent = '';
    return;
  }

  if (data.error) {
    body.innerHTML = `<div class="feedback-error">⚠️ ${data.error}</div>`;
    meta.textContent = '';
    return;
  }

  if (!data.success) {
    body.innerHTML = `<div class="feedback-error">⚠️ ${data.message || '피드백을 생성할 수 없습니다.'}</div>`;
    meta.textContent = '';
    return;
  }

  const exName = EXERCISE_NAMES[selectedExercise] || selectedExercise || '';
  meta.textContent = `${exName}  |  총 ${data.total_reps}회  |  ${data.sets}세트`;
  body.innerHTML   = `<div class="feedback-text">${escapeHtml(data.feedback)}</div>`;
}

function closeFeedback() {
  document.getElementById('feedbackPanel').classList.add('hidden');
}

function newWorkout() {
  document.getElementById('feedbackPanel').classList.add('hidden');
  restartSession();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 유틸
function show(id, v) { document.getElementById(id).classList.toggle('hidden', !v); }
function setBtn(id, d){ document.getElementById(id).disabled = d; }
function setBar(id, p) { document.getElementById(id).style.width = Math.min(Math.max(p,0),100)+'%'; }
function setSetupMsg(text, state) {
  const el = document.getElementById('setupMsg');
  el.textContent = text;
  el.className = 'setup-msg' + (state ? ' ' + state : '');
}
</script>
